# Deploys frontend/ to Vercel on every push to main.
#
# Requires these repository secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       — personal/team token from https://vercel.com/account/tokens
#   VERCEL_ORG_ID       — from `vercel link` in frontend/, written to .vercel/project.json
#   VERCEL_PROJECT_ID   — from `vercel link` in frontend/, written to .vercel/project.json
#
# These secrets do not exist yet in this repo. Until they are configured, this
# workflow will fail at the "Pull Vercel environment" step — that's expected.
# Vercel project linking is an interactive `vercel login` + `vercel link` done
# once locally; it is not something CI can bootstrap on its own.
name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
